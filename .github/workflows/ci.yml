name: CI Pipeline

on:
  push:
    branches: [ "main", "develop", "staging" ]
  pull_request:
    branches: [ "main", "develop", "staging" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
    - name: Install dependencies
      run: make deps
    - name: Format Check
      run: bunx @biomejs/biome format .
    - name: Lint Check
      run: make lint
    - name: Type Check
      run: bunx tsc --noEmit
      continue-on-error: true
    - name: Run Tests & Coverage
      run: make check-coverage

  docker:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    needs: build
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME_BASE: ghcr.io/${{ github.repository }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Normalize image name to lowercase
      run: echo "IMAGE_NAME_BASE=${IMAGE_NAME_BASE,,}" >> "$GITHUB_ENV"
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push API
      uses: docker/build-push-action@v6
      with:
        context: .
        file: apps/api/Dockerfile
        push: true
        tags: |
          ${{ env.IMAGE_NAME_BASE }}/api:${{ github.ref_name }}
          ${{ env.IMAGE_NAME_BASE }}/api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Frontend
      uses: docker/build-push-action@v6
      with:
        context: .
        file: apps/frontend/Dockerfile
        push: true
        tags: |
          ${{ env.IMAGE_NAME_BASE }}/frontend:${{ github.ref_name }}
          ${{ env.IMAGE_NAME_BASE }}/frontend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push CLI
      uses: docker/build-push-action@v6
      with:
        context: .
        file: apps/cli/Dockerfile
        push: true
        tags: |
          ${{ env.IMAGE_NAME_BASE }}/cli:${{ github.ref_name }}
          ${{ env.IMAGE_NAME_BASE }}/cli:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
