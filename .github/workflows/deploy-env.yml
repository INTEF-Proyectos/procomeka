name: Deploy to Environments

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-pre:
    name: Deploy to PRE
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy to PRE
        run: |
          echo "Simulating deployment to PRE environment..."
          echo "1. Connect to PRE server via SSH"
          echo "2. Copy docker-compose.prod.yml and .env.pre"
          echo "3. Run: docker compose -f docker-compose.prod.yml pull"
          echo "4. Run: docker compose -f docker-compose.prod.yml up -d --remove-orphans"
          echo "5. Run: docker compose run --rm cli migrate"
          echo "PRE deployment complete."

  deploy-pro:
    name: Deploy to PRO
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://procomeka.es
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy to PRO
        run: |
          echo "Simulating production deployment (after approval)..."
          echo "1. Pull latest images from GHCR"
          echo "2. Apply blue-green or rolling update"
          echo "3. Run database migrations"
          echo "PRO deployment complete."
